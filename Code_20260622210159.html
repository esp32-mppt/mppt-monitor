<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MPPT 远程监控</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #0f1724;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 12px;
  overflow-x: hidden;
}
.header {
  text-align: center;
  padding: 18px 10px 14px;
  background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
  border-radius: 16px;
  margin-bottom: 12px;
  border: 1px solid #1e3a5c;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.header h1 {
  font-size: 22px;
  color: #4fc3f7;
  font-weight: 700;
  letter-spacing: 2px;
}
.header .subtitle {
  font-size: 12px;
  color: #78909c;
  margin-top: 4px;
}
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  background: #1a2332;
  border-radius: 10px;
  margin-bottom: 12px;
  font-size: 12px;
  border: 1px solid #263248;
}
.status-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.status-dot.ok { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
.status-dot.err { background: #f44336; box-shadow: 0 0 6px #f44336; }
.status-dot.connecting { background: #ff9800; box-shadow: 0 0 6px #ff9800; animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.card {
  background: #1a2332;
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
  border: 1px solid #263248;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 14px 14px 0 0;
}
.card.pv::before { background: linear-gradient(90deg, #f9a825, #ff6f00); }
.card.bat::before { background: linear-gradient(90deg, #4fc3f7, #0277bd); }
.card.load::before { background: linear-gradient(90deg, #ce93d8, #7b1fa2); }
.card.energy::before { background: linear-gradient(90deg, #aed581, #33691e); }
.card.max::before { background: linear-gradient(90deg, #ff8a65, #d84315); }

.card .icon { font-size: 28px; margin-bottom: 6px; }
.card .label { font-size: 11px; color: #78909c; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.card .value { font-size: 26px; font-weight: 700; color: #ffffff; line-height: 1.2; }
.card .unit { font-size: 12px; color: #546e7a; margin-left: 2px; }
.card .sub { font-size: 11px; color: #546e7a; margin-top: 6px; }

.full-width {
  grid-column: 1 / -1;
}

.footer {
  text-align: center;
  font-size: 10px;
  color: #37474f;
  margin-top: 16px;
  padding-bottom: 10px;
}

/* 暗色主题滚动条 */
::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ 拓阳 MPPT M12PB</h1>
  <div class="subtitle">远程实时监控 · EMQX Cloud</div>
</div>

<div class="status-bar">
  <div>
    <span class="status-dot connecting" id="statusDot"></span>
    <span id="statusText">正在连接...</span>
  </div>
  <div id="lastUpdate" style="color:#546e7a;">--:--:--</div>
</div>

<div class="grid">
  <!-- 光伏 -->
  <div class="card pv">
    <div class="icon">☀️</div>
    <div class="label">光伏功率</div>
    <div class="value"><span id="pvW">--</span><span class="unit">W</span></div>
    <div class="sub">电压 <span id="pvV">--</span>V / 电流 <span id="pvA">--</span>A</div>
  </div>

  <!-- 电池 -->
  <div class="card bat">
    <div class="icon">🔋</div>
    <div class="label">电池状态</div>
    <div class="value"><span id="soc">--</span><span class="unit">%</span></div>
    <div class="sub">电压 <span id="batV">--</span>V</div>
  </div>

  <!-- 负载 -->
  <div class="card load">
    <div class="icon">💡</div>
    <div class="label">负载功率</div>
    <div class="value"><span id="loadW">--</span><span class="unit">W</span></div>
  </div>

  <!-- 发电量 -->
  <div class="card energy">
    <div class="icon">⚡</div>
    <div class="label">发电量</div>
    <div class="value"><span id="todayWh">--</span><span class="unit">kWh 今日</span></div>
    <div class="sub">累计 <span id="totalWh">--</span> kWh</div>
  </div>

  <!-- 功率峰值 -->
  <div class="card max full-width">
    <div class="icon">📊</div>
    <div class="label">光伏功率峰值</div>
    <div class="value">
      <span style="font-size:16px;color:#ff8a65;">今日最大</span> <span id="pvMaxToday" style="color:#ff8a65;">--</span><span style="font-size:14px;color:#ff8a65;"> W</span>
      &nbsp;&nbsp;|&nbsp;&nbsp;
      <span style="font-size:16px;color:#ce93d8;">历史最大</span> <span id="pvMaxHist" style="color:#ce93d8;">--</span><span style="font-size:14px;color:#ce93d8;"> W</span>
    </div>
  </div>
</div>

<div class="footer">
  Powered by ESP32 + EMQX Cloud · 随时随地远程监控
</div>

<!-- MQTT.js (浏览器版) -->
<script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
<script>
const CONFIG = {
  broker: 'wss://p488f115.ala.cn-hangzhou.emqxsl.cn:8084/mqtt',
  topic: 'mppt/data',
  username: 'esp32-mppt',
  password: 'a12345678'
};

const $ = id => document.getElementById(id);
const dot = $('statusDot');
const txt = $('statusText');

function setStatus(state, msg) {
  dot.className = 'status-dot ' + state;
  txt.textContent = msg;
}

// 连接 MQTT
let client;
try {
  client = mqtt.connect(CONFIG.broker, {
    clientId: 'web_' + Math.random().toString(16).substr(2, 8),
    username: CONFIG.username,
    password: CONFIG.password,
    clean: true,
    reconnectPeriod: 5000,
    connectTimeout: 10 * 1000
  });
} catch(e) {
  setStatus('err', 'MQTT 库加载失败');
  console.error(e);
}

client.on('connect', () => {
  setStatus('ok', '🟢 已连接 EMQX Cloud');
  client.subscribe(CONFIG.topic, { qos: 0 }, (err) => {
    if (err) setStatus('err', '订阅失败: ' + err);
  });
});

client.on('reconnect', () => {
  setStatus('connecting', '🔄 重新连接中...');
});

client.on('error', (err) => {
  setStatus('err', '❌ 连接错误: ' + err.message);
  console.error(err);
});

client.on('close', () => {
  setStatus('err', '🔴 已断开');
});

client.on('message', (topic, message) => {
  try {
    const d = JSON.parse(message.toString());
    updateUI(d);
  } catch(e) {}
});

function updateUI(d) {
  $('pvV').textContent = (d.pvV ?? '--').toFixed ? d.pvV.toFixed(2) : '--';
  $('pvA').textContent = (d.pvA ?? '--').toFixed ? d.pvA.toFixed(2) : '--';
  $('pvW').textContent = (d.pvW ?? '--').toFixed ? Math.round(d.pvW) : '--';
  $('batV').textContent = (d.batV ?? '--').toFixed ? d.batV.toFixed(2) : '--';
  $('soc').textContent = (d.soc ?? '--').toFixed ? d.soc.toFixed(1) : '--';
  $('loadW').textContent = (d.loadW ?? '--').toFixed ? d.loadW.toFixed(1) : '--';
  $('todayWh').textContent = (d.todayWh ?? '--').toFixed ? d.todayWh.toFixed(3) : '--';
  $('totalWh').textContent = (d.totalWh ?? '--').toFixed ? d.totalWh.toFixed(3) : '--';
  $('pvMaxToday').textContent = (d.pvMaxToday ?? '--').toFixed ? d.pvMaxToday.toFixed(1) : '--';
  $('pvMaxHist').textContent = (d.pvMaxHist ?? '--').toFixed ? d.pvMaxHist.toFixed(1) : '--';

  // 更新时间
  const now = new Date();
  $('lastUpdate').textContent =
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0') + ':' +
    now.getSeconds().toString().padStart(2,'0');
}
</script>
</body>
</html>

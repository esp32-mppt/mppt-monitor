<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拓阳 MPPT M12PB 远程监控</title>
<style>
body{margin:0;background:#e3eaf3;font-family:'Segoe UI',Arial,sans-serif;padding-bottom:100px;}
.header{background:linear-gradient(135deg,#a8e6cf,#dcedc1);padding:18px;text-align:center;font-size:26px;font-weight:bold;color:#2e7d32;}

/* 状态栏 */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;font-size:12px;color:#555;background:#fff;border-bottom:1px solid #ddd;}
.status-bar .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;}
.status-bar .dot.green{background:#4caf50;box-shadow:0 0 6px #4caf50;}
.status-bar .dot.orange{background:#ff9800;box-shadow:0 0 6px #ff9800;}
.status-bar .dot.red{background:#f44336;box-shadow:0 0 6px #f44336;}

.card{background:#ffffff;margin:10px 12px;border-radius:14px;padding:14px 16px;box-shadow:0 3px 10px rgba(0,0,0,0.04);}
.card h2{margin:0 0 10px 0;font-size:17px;color:#1e90ff;display:flex;align-items:center;}
.card h2 span{margin-right:6px;font-size:18px;}
.pv-row{display:flex;justify-content:space-between;text-align:center;}
.center-row{display:flex;justify-content:center;text-align:center;gap:40px;}
.label{font-size:13px;color:#777;margin-bottom:4px;}
.value{font-size:26px;font-weight:bold;color:#2c3e50;}
.unit{font-size:12px;color:#999;}

/* 最后更新时间 */
.footer{text-align:center;color:#999;font-size:12px;margin-top:10px;}
</style>
</head>
<body>

<div class="header">拓阳 MPPT M12PB</div>

<!-- 状态栏 -->
<div class="status-bar">
  <div><span class="dot" id="statusDot"></span><span id="statusText">连接中...</span></div>
  <div id="updateTime">--:--:--</div>
</div>

<!-- 光伏状态 -->
<div class="card">
  <h2><span>☀️</span>光伏状态</h2>
  <div class="pv-row">
    <div><div class="label">电压</div><div class="value" id="pvV">--</div><div class="unit">V</div></div>
    <div><div class="label">电流</div><div class="value" id="pvA">--</div><div class="unit">A</div></div>
    <div><div class="label">功率</div><div class="value" id="pvW">--</div><div class="unit">W</div></div>
  </div>
</div>

<!-- 电池状态 -->
<div class="card">
  <h2><span>🔋</span>电池状态</h2>
  <div class="center-row">
    <div><div class="label">电压</div><div class="value" id="batV">--</div><div class="unit">V</div></div>
    <div><div class="label">SOC</div><div class="value" id="soc">--</div><div class="unit">%</div></div>
  </div>
</div>

<!-- 负载状态 -->
<div class="card">
  <h2><span>💡</span>负载状态</h2>
  <div class="center-row">
    <div><div class="label">电流</div><div class="value" id="loadA">--</div><div class="unit">A</div></div>
    <div><div class="label">功率</div><div class="value" id="loadW">--</div><div class="unit">W</div></div>
  </div>
</div>

<!-- 发电量统计 -->
<div class="card">
  <h2><span>⚡</span>发电量统计</h2>
  <div class="center-row">
    <div><div class="label">当日</div><div class="value" id="todayWh">--</div><div class="unit">kWh</div></div>
    <div><div class="label">累计</div><div class="value" id="totalWh">--</div><div class="unit">kWh</div></div>
  </div>
</div>

<!-- 光伏功率统计 -->
<div class="card">
  <h2><span>☀️</span>光伏功率统计</h2>
  <div class="center-row">
    <div><div class="label">当日最大</div><div class="value" id="pvMaxToday">--</div><div class="unit">W</div></div>
    <div><div class="label">历史最大</div><div class="value" id="pvMaxHist">--</div><div class="unit">W</div></div>
  </div>
</div>

<div class="footer" id="footerText">等待数据中...</div>

<!-- MQTT.js（小程序用不了，但 H5 网页可以用） -->
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<script>
/* ========== 配置区 ========== */
const CONFIG = {
  broker: 'wss://p488f115.ala.cn-hangzhou.emqxsl.cn:8084/mqtt',
  topic: 'mppt/data',
  username: 'esp32-mppt',
  password: 'a12345678'
};

/* ========== DOM ========== */
const $ = id => document.getElementById(id);
const dot = $('statusDot');
const statusText = $('statusText');
const footerText = $('footerText');

/* ========== 时间更新 ========== */
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  $('updateTime').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
}
setInterval(updateClock, 1000);
updateClock();

/* ========== MQTT 连接 ========== */
let client = null;
let reconnectTimer = null;

function connect() {
  setStatus('connecting', '正在连接 EMQX...');

  client = mqtt.connect(CONFIG.broker, {
    clientId: 'web_' + Math.random().toString(16).substr(2, 8),
    username: CONFIG.username,
    password: CONFIG.password,
    clean: true,
    reconnectPeriod: 5000,
    connectTimeout: 10000
  });

  client.on('connect', () => {
    clearTimeout(reconnectTimer);
    setStatus('connected', '已连接 EMQX ☁️');
    client.subscribe(CONFIG.topic, { qos: 0 }, (err) => {
      if (err) console.error('Subscribe error:', err);
    });
  });

  client.on('message', (topic, message) => {
    try {
      const d = JSON.parse(message.toString());
      render(d);
    } catch (e) {
      console.warn('Parse error:', e);
    }
  });

  client.on('error', (err) => {
    console.error('MQTT error:', err);
    setStatus('error', '连接错误: ' + err.message);
  });

  client.on('close', () => {
    setStatus('disconnected', '已断开，正在重连...');
    // 10 秒后如果还没连上，尝试重新初始化连接
    reconnectTimer = setTimeout(() => {
      if (client) {
        client.end(true);
        client = null;
      }
      connect();
    }, 10000);
  });

  client.on('offline', () => {
    setStatus('disconnected', '网络离线，等待重连...');
  });
}

function setStatus(state, text) {
  statusText.textContent = text;
  dot.className = 'dot ' + state;
}

/* ========== 渲染数据 ========== */
function render(d) {
  $('pvV').textContent  = fmt(d.pvV, 2);
  $('pvA').textContent  = fmt(d.pvA, 2);
  $('pvW').textContent  = fmt(d.pvW, 0);
  $('batV').textContent = fmt(d.batV, 2);
  $('soc').textContent  = fmt(d.soc, 1);
  $('loadA').textContent = fmt(d.loadA, 2);
  $('loadW').textContent = fmt(d.loadW, 1);
  $('todayWh').textContent  = fmt(d.todayWh, 3);
  $('totalWh').textContent  = fmt(d.totalWh, 3);
  $('pvMaxToday').textContent = fmt(d.pvMaxToday, 1);
  $('pvMaxHist').textContent  = fmt(d.pvMaxHist, 1);

  footerText.textContent = '最后更新: ' + new Date().toLocaleString('zh-CN');
}

function fmt(v, dec) {
  return (v === undefined || v === null) ? '--' : Number(v).toFixed(dec);
}

/* ========== 启动 ========== */
connect();
</script>
</body>
</html>
